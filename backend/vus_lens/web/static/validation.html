<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VUS·Lens — measured safe</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%230C5D57' stroke-width='3'/%3E%3Ccircle cx='16' cy='16' r='2.6' fill='%230C5D57'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" media="print" onload="this.media='all'"
  href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap">
<style>
  :root{
    --paper:#F3F1EA; --surface:#FCFBF7; --surface-2:#F7F5EE;
    --ink:#1B1D1F; --ink-soft:#484B4E; --muted:#8A877E; --faint:#B4B1A6;
    --line:#E4E1D6; --line-soft:#EDEAE0;
    --accent:#0C5D57; --accent-deep:#093F3B; --accent-soft:#E4EEEC; --accent-fill:#0E7E72;
    --caution:#8F6412; --caution-fill:#B4791A; --caution-bg:#F8F0DC;
    --critical:#8C2A22; --critical-fill:#9E3128; --critical-bg:#F6E7E2;
    --neutral-fill:#C4C0B4; --neutral-soft:#D8D4C8;
    --serif:'Spectral',Georgia,serif; --sans:'IBM Plex Sans',-apple-system,'Segoe UI',sans-serif; --mono:'IBM Plex Mono',Consolas,monospace;
    --shadow:0 1px 2px rgba(27,29,31,.04), 0 10px 34px -16px rgba(27,29,31,.20);
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans);
    font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(1100px 560px at 84% -10%, rgba(12,93,87,.06), transparent 60%),
      radial-gradient(820px 460px at -5% 108%, rgba(12,93,87,.03), transparent 55%);
    min-height:100vh;
  }
  .wrap{max-width:820px; margin:0 auto; padding:54px 26px 80px}
  .stagger>*{opacity:0; transform:translateY(10px); animation:rise .6s cubic-bezier(.2,.7,.3,1) forwards}
  .stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.22s}.stagger>*:nth-child(4){animation-delay:.32s}
  @keyframes rise{to{opacity:1;transform:none}}

  .brand{font-family:var(--mono); font-weight:600; font-size:13px; letter-spacing:.42em; color:var(--accent); text-transform:uppercase; display:inline-flex; align-items:center; gap:10px}
  .brand::before{content:""; width:26px; height:1.5px; background:var(--accent)}
  .lede{font-family:var(--serif); font-weight:400; font-size:30px; line-height:1.28; letter-spacing:-.01em; margin:18px 0 10px; max-width:24ch}
  .sub{font-family:var(--mono); font-size:11.5px; letter-spacing:.04em; color:var(--muted)}
  .sub b{color:var(--ink-soft); font-weight:500}

  .panel{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:26px 28px; margin-top:22px; box-shadow:var(--shadow)}
  .panel.seal{border-color:var(--accent-soft); background:linear-gradient(180deg,var(--surface),#F3FAF8)}
  .eyebrow{font-family:var(--mono); font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:9px}
  .eyebrow::before{content:""; width:6px; height:6px; border-radius:50%}
  .seal .eyebrow::before{background:var(--accent)} .live .eyebrow::before{background:var(--caution-fill)}
  .claim{font-family:var(--serif); font-weight:500; font-size:23px; line-height:1.36; letter-spacing:-.01em; margin:0 0 6px; color:var(--ink)}
  .claim .hot{color:var(--accent)} .claim em{font-style:italic}
  .note3{font-family:var(--mono); font-size:11.5px; letter-spacing:.02em; color:var(--accent-deep); background:var(--accent-soft); border-radius:8px; padding:8px 12px; margin:2px 0 18px; display:inline-block}

  .stats{display:flex; gap:34px; margin:10px 0 20px; flex-wrap:wrap; align-items:flex-end}
  .stat .big{font-family:var(--serif); font-size:56px; font-weight:600; line-height:1; letter-spacing:-.02em}
  .stat.safe .big{color:var(--accent)} .stat.neutral .big{color:var(--ink-soft)} .stat.neutral .big{font-size:40px}
  .stat .cap{font-size:12.5px; color:var(--ink-soft); margin-top:8px; max-width:30ch; line-height:1.45}
  .stat .cap b{font-family:var(--mono); font-weight:600; color:var(--ink)}

  .bar-wrap{margin:10px 0 4px}
  .bar-title{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:9px}
  .bar{display:flex; gap:2px; height:40px; border-radius:8px; overflow:hidden; background:var(--surface-2)}
  .seg{position:relative; min-width:0; display:flex; align-items:center; padding:0 11px; overflow:hidden}
  .seg:first-child{border-radius:8px 0 0 8px} .seg:last-child{border-radius:0 8px 8px 0}
  .seg .n{font-family:var(--mono); font-weight:600; font-size:14px; color:#fff; white-space:nowrap}
  .seg.light .n{color:var(--ink-soft)}
  .seg .k{font-size:10.5px; color:rgba(255,255,255,.85); margin-left:7px; white-space:nowrap}
  .seg.light .k{color:var(--muted)}
  .seg.teal{background:var(--accent-fill)} .seg.amber{background:var(--caution-fill)}
  .seg.crimson{background:var(--critical-fill)} .seg.neutral{background:var(--neutral-fill)} .seg.neutral2{background:var(--neutral-soft)}
  .legend{display:flex; gap:16px; flex-wrap:wrap; margin-top:12px; font-size:11.5px; color:var(--ink-soft)}
  .legend span{display:inline-flex; align-items:center; gap:6px}
  .dot{width:9px; height:9px; border-radius:2px; flex:none}
  .dot.teal{background:var(--accent-fill)} .dot.amber{background:var(--caution-fill)} .dot.crimson{background:var(--critical-fill)} .dot.neutral{background:var(--neutral-fill)} .dot.neutral2{background:var(--neutral-soft)}
  .ycomp{margin-top:14px; font-size:13px; color:var(--ink-soft); line-height:1.6; border-top:1px dashed var(--line); padding-top:12px}
  .ycomp b{font-family:var(--mono); font-weight:600; color:var(--ink)}
  .takeaway{margin:18px 0 0; font-size:14.5px; line-height:1.55; color:var(--accent-deep); font-weight:500; border-left:2px solid var(--accent); padding-left:14px}

  .foot{margin-top:30px; padding-top:20px; border-top:1px solid var(--line); color:var(--muted); font-size:12px; line-height:1.7}
  .foot .fl{font-weight:600; color:var(--ink-soft); font-size:12.5px; margin-bottom:6px}
  .foot code{font-family:var(--mono); font-size:11px; color:var(--accent)}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="brand">VUS · Lens</div>
  <div class="lede">How do we know it's safe? We measured it.</div>
  <div class="sub" id="sub">loading…</div>
  <div id="body"></div>
</div>
<script>
const nf = n => n.toLocaleString('en-US');

// Baked-in committed result (data/validation/gt_2star.json, deterministic run
// retrieved 2026-07-11) so the panel is self-contained — it renders as a standalone
// file or served by the app; no fetch, no server required. 3★ core reproduces the
// safe-direction result. Regenerate: uv run --no-sync python scripts/ground_truth_validation.py
const GT = {
  tier: "ClinVar 2★+ (multiple submitters, no conflicts — or expert panel)",
  path:  { n: 1277, benign: 0, vus_data: 397, vus_absent: 880 },
  benign:{ n: 1303, correct: 144, vus_data: 910, vus_absent: 249, def_B: 94, def_B_correct: 58, lb: 1050, lb_correct: 27 },
  core3: { n_path: 72, benign: 0 }
};

function seg(cls, count, label, light){
  if(!count) return '';  // a zero segment renders nothing — no sliver, no padding
  return `<div class="seg ${cls}${light?' light':''}" style="flex:${count} 0 0" title="${label}: ${nf(count)}">
    <span class="n">${nf(count)}</span><span class="k">${label}</span></div>`;
}

function render(d){
  const p = d.path, b = d.benign;
  document.getElementById('sub').innerHTML =
    `<b>${nf(p.n)} known-pathogenic + ${nf(b.n)} known-benign</b> ATM/PALB2 variants &nbsp;·&nbsp; ${d.tier} &nbsp;·&nbsp; deterministic engine, no LLM`;

  document.getElementById('wrap').classList.add('stagger');
  document.getElementById('body').innerHTML = `
    <section class="panel seal">
      <div class="eyebrow">The safety seal — measured, not asserted</div>
      <h2 class="claim">Across ${nf(p.n)} known-pathogenic variants, the deterministic engine returned a benign call <span class="hot">zero</span> times.</h2>
      <div class="note3">Highest-confidence subset — 3★ expert-panel P/LP (${d.core3.n_path}): same result, ${d.core3.benign} false-benign.</div>
      <div class="stats">
        <div class="stat safe"><div class="big">0</div><div class="cap">of <b>${nf(p.n)}</b> known-pathogenic variants called benign — zero false reassurance.</div></div>
        <div class="stat neutral"><div class="big">${nf(p.vus_data)}</div><div class="cap">had gnomAD frequency data — the real test: they <em>could</em> have tripped a benign rule (BA1/BS1). None did.</div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-title">All ${nf(p.n)} known-pathogenic · engine output</div>
        <div class="bar">
          ${seg('crimson', p.benign, 'called benign')}
          ${seg('teal', p.vus_data, 'held at VUS · had freq data')}
          ${seg('neutral', p.vus_absent, 'held at VUS · absent from gnomAD', true)}
        </div>
        <div class="legend">
          <span><i class="dot crimson"></i>called benign — false reassurance · <b>${p.benign}</b></span>
          <span><i class="dot teal"></i>held at VUS, had frequency data · ${nf(p.vus_data)}</span>
          <span><i class="dot neutral"></i>held at VUS, absent from gnomAD · ${nf(p.vus_absent)}</span>
        </div>
      </div>
      <p class="takeaway">Every one evaluated (0 could-not-evaluate). The variants common enough to <em>possibly</em> be called benign had their real gnomAD filtering-AF fetched to test exactly that — and none crossed the line.</p>
    </section>

    <section class="panel live">
      <div class="eyebrow">The zero is a real property, not disabled logic</div>
      <h2 class="claim">The benign criteria are <em>provably active</em> — they simply never fired on a pathogenic variant.</h2>
      <div class="stats">
        <div class="stat safe"><div class="big">58<span style="font-size:26px;color:var(--muted)">/94</span></div><div class="cap">definitively-benign variants correctly called <b>Benign</b> — the machinery fires when the evidence supports it.</div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-title">All ${nf(b.n)} known-benign · engine output</div>
        <div class="bar">
          ${seg('teal', b.correct, 'Benign')}
          ${seg('amber', b.vus_data, 'held at VUS · had freq data')}
          ${seg('neutral', b.vus_absent, 'held at VUS · absent', true)}
        </div>
        <div class="legend">
          <span><i class="dot teal"></i>correctly called Benign/LB · ${nf(b.correct)}</span>
          <span><i class="dot amber"></i>held at VUS, had frequency data · ${nf(b.vus_data)}</span>
          <span><i class="dot neutral"></i>held at VUS, absent · ${nf(b.vus_absent)}</span>
        </div>
      </div>
      <div class="ycomp">The engine under-calls benign too, <em>by design</em>: Likely-benign variants mostly stay VUS (<b>${nf(b.lb_correct)}</b> of <b>${nf(b.lb)}</b> reach a benign call) because a lone BS1 stays VUS under the ACMG combining rules. This is not accuracy against expert panels — it is a deliberate ACMG <em>subset</em> that abstains rather than guesses.</div>
      <p class="takeaway">It never false-reassures — and it never bluffs a benign call it can't support. The same honest-abstention discipline, in both directions.</p>
    </section>

    <footer class="foot">
      <div class="fl">Measured, not asserted.</div>
      Deterministic engine, no LLM, $0. The score path calls the same frequency / in-silico / ClinVar / aggregation functions the demo uses, <b>parity-checked</b> against the single-variant pipeline. Real gnomAD faf95 is fetched for every variant common enough to matter (faf95 ≤ raw AF), so the “0” is measured with the benign machinery <em>live</em>, not structurally disabled. Empty ≠ clean: 0 could-not-evaluate.<br>
      Ground truth: ClinVar 2★+ via MyVariant.info · gnomAD v4 (faf95) · ClinGen HBOP VCEP thresholds (ATM GN020, PALB2 GN077). Regenerate: <code>uv run --no-sync python scripts/ground_truth_validation.py --tier 2star</code>
    </footer>`;
}

render(GT);
</script>
</body>
</html>
