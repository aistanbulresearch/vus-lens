<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VUS·Lens — at cohort scale</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='9' fill='none' stroke='%230C5D57' stroke-width='3'/%3E%3Ccircle cx='16' cy='16' r='2.6' fill='%230C5D57'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" media="print" onload="this.media='all'"
  href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap">
<style>
  :root{
    --paper:#F3F1EA; --surface:#FCFBF7; --surface-2:#F7F5EE;
    --ink:#1B1D1F; --ink-soft:#484B4E; --muted:#8A877E; --faint:#B4B1A6;
    --line:#E4E1D6; --line-soft:#EDEAE0;
    --accent:#0C5D57; --accent-deep:#093F3B; --accent-soft:#E4EEEC; --accent-fill:#0E7E72;
    --caution:#8F6412; --caution-fill:#B4791A; --caution-bg:#F8F0DC;
    --critical:#8C2A22; --critical-fill:#9E3128; --critical-bg:#F6E7E2;
    --neutral-fill:#C4C0B4;
    --serif:'Spectral',Georgia,serif; --sans:'IBM Plex Sans',-apple-system,'Segoe UI',sans-serif; --mono:'IBM Plex Mono',Consolas,monospace;
    --shadow:0 1px 2px rgba(27,29,31,.04), 0 10px 34px -16px rgba(27,29,31,.20);
  }
  *{box-sizing:border-box}
  body{
    margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans);
    font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased;
    background-image:
      radial-gradient(1100px 560px at 84% -10%, rgba(12,93,87,.05), transparent 60%),
      radial-gradient(820px 460px at -5% 108%, rgba(140,42,34,.035), transparent 55%);
    min-height:100vh;
  }
  .wrap{max-width:820px; margin:0 auto; padding:54px 26px 80px}
  .stagger>*{opacity:0; transform:translateY(10px); animation:rise .6s cubic-bezier(.2,.7,.3,1) forwards}
  .stagger>*:nth-child(1){animation-delay:.03s}.stagger>*:nth-child(2){animation-delay:.12s}
  .stagger>*:nth-child(3){animation-delay:.22s}.stagger>*:nth-child(4){animation-delay:.32s}
  @keyframes rise{to{opacity:1;transform:none}}

  .brand{font-family:var(--mono); font-weight:600; font-size:13px; letter-spacing:.42em; color:var(--accent); text-transform:uppercase; display:inline-flex; align-items:center; gap:10px}
  .brand::before{content:""; width:26px; height:1.5px; background:var(--accent)}
  .lede{font-family:var(--serif); font-weight:400; font-size:30px; line-height:1.28; letter-spacing:-.01em; margin:18px 0 10px; max-width:26ch}
  .sub{font-family:var(--mono); font-size:11.5px; letter-spacing:.04em; color:var(--muted)}
  .sub b{color:var(--ink-soft); font-weight:500}

  .panel{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:26px 28px; margin-top:22px; box-shadow:var(--shadow)}
  .panel.primary{border-color:var(--critical-bg); background:linear-gradient(180deg,var(--surface),#FCF7F3)}
  .eyebrow{font-family:var(--mono); font-size:10.5px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin-bottom:12px; display:flex; align-items:center; gap:9px}
  .eyebrow::before{content:""; width:6px; height:6px; border-radius:50%}
  .primary .eyebrow::before{background:var(--critical)} .rigor .eyebrow::before{background:var(--accent)}
  .claim{font-family:var(--serif); font-weight:500; font-size:23px; line-height:1.36; letter-spacing:-.01em; margin:0 0 18px; color:var(--ink)}
  .claim .hot{color:var(--critical)} .claim em{font-style:italic}

  .stats{display:flex; gap:34px; margin:6px 0 20px; flex-wrap:wrap}
  .stat .big{font-family:var(--serif); font-size:46px; font-weight:600; line-height:1; letter-spacing:-.02em}
  .stat.crit .big{color:var(--critical)} .stat.neutral .big{color:var(--ink-soft)}
  .stat .cap{font-size:12.5px; color:var(--ink-soft); margin-top:8px; max-width:26ch; line-height:1.45}

  .bar-wrap{margin:8px 0 4px}
  .bar-title{font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-bottom:9px}
  .bar{display:flex; gap:2px; height:40px; border-radius:8px; overflow:hidden; background:var(--surface-2)}
  .seg{position:relative; min-width:2px; display:flex; align-items:center; padding:0 11px; overflow:hidden}
  .seg:first-child{border-radius:8px 0 0 8px} .seg:last-child{border-radius:0 8px 8px 0}
  .seg .n{font-family:var(--mono); font-weight:600; font-size:14px; color:#fff; white-space:nowrap}
  .seg.light .n{color:var(--ink)}
  .seg .k{font-size:10.5px; color:rgba(255,255,255,.85); margin-left:7px; white-space:nowrap}
  .seg.light .k{color:var(--ink-soft)}
  .seg.teal{background:var(--accent-fill)} .seg.amber{background:var(--caution-fill)}
  .seg.crimson{background:var(--critical-fill)} .seg.neutral{background:var(--neutral-fill)}
  .legend{display:flex; gap:16px; flex-wrap:wrap; margin-top:12px; font-size:11.5px; color:var(--ink-soft)}
  .legend span{display:inline-flex; align-items:center; gap:6px}
  .dot{width:9px; height:9px; border-radius:2px; flex:none}
  .dot.teal{background:var(--accent-fill)} .dot.amber{background:var(--caution-fill)} .dot.crimson{background:var(--critical-fill)} .dot.neutral{background:var(--neutral-fill)}
  .ycomp{margin-top:14px; font-size:13px; color:var(--ink-soft); line-height:1.6; border-top:1px dashed var(--line); padding-top:12px}
  .ycomp b{font-family:var(--mono); font-weight:600; color:var(--ink)}
  .takeaway{margin:18px 0 0; font-size:14.5px; line-height:1.55; color:var(--accent-deep); font-weight:500; border-left:2px solid var(--accent); padding-left:14px}

  .foot{margin-top:30px; padding-top:20px; border-top:1px solid var(--line); color:var(--muted); font-size:12px; line-height:1.7}
  .foot .fl{font-weight:600; color:var(--ink-soft); font-size:12.5px; margin-bottom:6px}
  .foot code{font-family:var(--mono); font-size:11px; color:var(--accent)}
  .err{border:1px solid var(--critical-bg); background:var(--critical-bg); color:var(--critical); border-radius:12px; padding:18px}
</style>
</head>
<body>
<div class="wrap" id="wrap">
  <div class="brand">VUS · Lens</div>
  <div class="lede">The same audit, across a whole cohort.</div>
  <div class="sub" id="sub">loading…</div>
  <div id="body"></div>
</div>
<script>
const pct = (a,b)=> b ? Math.round(a/b*100) : 0;
const nf = n => n.toLocaleString('en-US');

// Baked-in committed result (data/cohort/cohort_result.json, deterministic run
// retrieved 2026-07-11) so the panel is fully self-contained -- it renders whether
// opened as a standalone file or served by the app; no fetch, no server required.
// Regenerate + re-embed via: uv run --no-sync python scripts/cohort_batch.py --full
const COHORT = {
  "cohort_label": "ATM/PALB2 ClinVar germline VUS, retrieved 2026-07-11",
  "cohort_counts": {"ATM": 7824, "PALB2": 2923},
  "N_total": 10747,
  "could_not_evaluate": {"myvariant_unavailable": 0, "gnomad_error": 0, "absent_from_gnomad": 6544},
  "rigor": {"N_am_pathogenic": 1987, "X_corroborated_revel_pp3": 865, "Y_not_corroborated": 1122,
            "Y_composition": {"REVEL indeterminate": 787, "REVEL benign-direction": 95, "REVEL withheld": 240}},
  "disparity": {"gnomad_present": 4203, "Z_mid_inadequate_rule_of_3": 3874}
};

function seg(cls, count, total, label, light){
  const w = Math.max(count/total*100, 0);
  return `<div class="seg ${cls}${light?' light':''}" style="flex:${count} 0 0" title="${label}: ${nf(count)}">
    <span class="n">${nf(count)}</span><span class="k">${label}</span></div>`;
}

function render(d){
  const dis = d.disparity, rig = d.rigor, cne = d.could_not_evaluate;
  const total = d.N_total;
  const present = dis.gnomad_present, inadeq = dis.Z_mid_inadequate_rule_of_3;
  const adeq = present - inadeq, absent = cne.absent_from_gnomad;
  const zRate = pct(inadeq, present), absRate = pct(absent, total);
  const N = rig.N_am_pathogenic, X = rig.X_corroborated_revel_pp3, Y = rig.Y_not_corroborated;
  const yc = rig.Y_composition;

  document.getElementById('sub').innerHTML =
    `<b>${d.cohort_label}</b> &nbsp;·&nbsp; N = ${nf(total)} (ATM ${nf(d.cohort_counts.ATM)} + PALB2 ${nf(d.cohort_counts.PALB2)}) &nbsp;·&nbsp; deterministic engine, no LLM`;

  document.getElementById('wrap').classList.add('stagger');
  document.getElementById('body').innerHTML = `
    <section class="panel primary">
      <div class="eyebrow">The disparity, at cohort scale</div>
      <h2 class="claim">For a Turkish or Middle Eastern patient, a <span class="hot">"rare — likely benign"</span> call can rest on data that was never collected for them.</h2>
      <div class="stats">
        <div class="stat crit"><div class="big">${zRate}%</div><div class="cap">of the VUS gnomAD <em>does</em> cover lean on a Middle Eastern sample too small to trust (rule of 3).</div></div>
        <div class="stat neutral"><div class="big">${absRate}%</div><div class="cap">aren't in gnomAD at all — no ancestry data for these patients whatsoever.</div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-title">All ${nf(total)} VUS · by strength of frequency evidence for a Middle Eastern patient</div>
        <div class="bar">
          ${seg('crimson', inadeq, total, 'inadequate ME sample')}
          ${seg('teal', adeq, total, 'adequate')}
          ${seg('neutral', absent, total, 'absent from gnomAD', true)}
        </div>
        <div class="legend">
          <span><i class="dot crimson"></i>inadequate Middle Eastern sample · ${nf(inadeq)}</span>
          <span><i class="dot teal"></i>adequate · ${nf(adeq)}</span>
          <span><i class="dot neutral"></i>absent from gnomAD (no ancestry data) · ${nf(absent)}</span>
        </div>
      </div>
      <p class="takeaway">vus-lens catches this variant by variant, so a clinician sees which calls they can't trust for this patient — before it reaches the report.</p>
    </section>

    <section class="panel rigor">
      <div class="eyebrow">The rigor, at cohort scale</div>
      <h2 class="claim">Of ${nf(N)} variants AlphaMissense flags pathogenic, <em>fewer than half</em> survive full ACMG corroboration.</h2>
      <div class="bar-wrap">
        <div class="bar-title">${nf(N)} missense VUS with an AlphaMissense pathogenic-direction call</div>
        <div class="bar">
          ${seg('teal', X, N, 'corroborated (REVEL PP3)')}
          ${seg('amber', Y, N, 'not corroborated')}
        </div>
        <div class="legend">
          <span><i class="dot teal"></i>corroborated by the calibrated criterion (REVEL PP3) · ${nf(X)} (${pct(X,N)}%)</span>
          <span><i class="dot amber"></i>AlphaMissense-flagged, not corroborated · ${nf(Y)} (${pct(Y,N)}%)</span>
        </div>
      </div>
      <div class="ycomp">Not corroborated, by the calibrated evidence: <b>${nf(yc['REVEL indeterminate']||0)}</b> REVEL indeterminate · <b>${nf(yc['REVEL withheld']||0)}</b> REVEL withheld (PALB2 — the VCEP declines protein prediction by design) · <b>${nf(yc['REVEL benign-direction']||0)}</b> REVEL points benign. AlphaMissense is a valuable signal — this shows it is insufficient alone under ACMG, not that it is wrong.</div>
      <p class="takeaway">vus-lens separates the AI signal from the clinical decision — so a molecular tumor board spends its time on the variants that actually warrant it.</p>
    </section>

    <footer class="foot">
      <div class="fl">Empty ≠ clean, at scale.</div>
      0 MyVariant failures · 0 gnomAD errors · ${nf(absent)} absent from gnomAD are bucketed explicitly (no ancestry data — never counted as "benign"). Buckets fixed &amp; cited before the run; deterministic engine, no LLM; the batch is parity-checked against the single-variant pipeline.<br>
      Sources: MyVariant.info · gnomAD v4 (gene-bulk) · ClinVar. Rule of 3 (Hanley &amp; Lippman-Hand 1983) · REVEL/Pejaver 2022 · AlphaMissense (Cheng 2023). Regenerate: <code>uv run --no-sync python scripts/cohort_batch.py --full</code>
    </footer>`;
}

render(COHORT);
</script>
</body>
</html>
