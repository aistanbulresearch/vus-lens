# vuslens.aistanbulresearch.com  ->  VUS-Lens demo on 127.0.0.1:8001
#
# ISOLATED: this is a brand-new server block. It does NOT modify the main
# pipeline's server block(s). Install as /etc/nginx/sites-available/vuslens.conf,
# symlink into sites-enabled, then run:
#     sudo certbot --nginx -d vuslens.aistanbulresearch.com
# certbot upgrades THIS block to HTTPS (adds a :443 server + an HTTP->HTTPS
# redirect, preserving the location / below) and touches nothing else.

server {
    listen 80;
    listen [::]:80;
    server_name vuslens.aistanbulresearch.com;

    access_log /var/log/nginx/vuslens.access.log;
    error_log  /var/log/nginx/vuslens.error.log;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ---- SSE / live token stream (GET /api/reason, ~21 s per variant) ----
        # Disable buffering so tokens flush to the browser as they arrive, and
        # raise the timeouts well past the longest stream. The app also sends
        # `X-Accel-Buffering: no` on the SSE response as a second guard.
        proxy_buffering           off;
        proxy_cache               off;
        proxy_read_timeout        300s;
        proxy_send_timeout        300s;
        chunked_transfer_encoding on;
        proxy_set_header          Connection "";
    }
}
